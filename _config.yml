title: Seth C. Oranburg
description: "Law professor and scholar researching how technological disruption destabilizes moral norms and social trust, and how legal design can restore integrity to markets and institutions."
baseurl: ""
url: "https://oranburg.law"
# Web3Forms access key — get one free at https://web3forms.com (no account needed,
# just enter your email and they send you a key). Paste it between the quotes.
web3forms_access_key: "1f621cd8-66ab-4b92-9f3c-1b3805e67a52"

# Author (used by jekyll-seo-tag for Person schema)
author:
  name: Seth C. Oranburg
  url: https://oranburg.law
  twitter: oranburg

# Social / OG defaults
twitter:
  username: oranburg
social:
  name: Seth C. Oranburg
  links:
    - https://www.youtube.com/@BizLaw
    - https://papers.ssrn.com/sol3/cf_dev/AbsByAuth.cfm?per_id=2256355
    - https://bizlawbreakdown.podbean.com

# Default OG image for social sharing
defaults:
  - scope:
      path: ""
    values:
      image: /images/SCO - Purple Suit.jpg
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /insights/:year/:month/:day/:title/
future: true

# Exclude files from Jekyll build output
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# Plugins supported by GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
