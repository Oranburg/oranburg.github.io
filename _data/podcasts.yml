podcast:
  title: "Organized: The Business Law Breakdown"
  description: >
    Simplifies complex legal principles to make business law accessible
    to everyone. Uses real-world cases and practical contract law strategies
    to help business professionals, lawyers, and students master the
    essentials of business law.
  host: Seth C. Oranburg
  platform: Podbean
  url: https://bizlawbreakdown.podbean.com

