  - id: judgment-proof
    title: "Judgment Proof: The Reign of the Safety Machine versus the Recovery of Human Wisdom"
    type: book
    year: 2026
    status: in-progress
    journal:
    citation: "Seth C. Oranburg, Judgment Proof (forthcoming)."
    coauthors: []
    abstract: >
      Modern institutions have engineered out the faculty of judgment and
      become "judgment-proof" in both the legal and epistemic sense. Drawing
      on Maimonides's distinction between tikkun ha-guf (material
      infrastructure) and tikkun ha-nefesh (cultivation of wisdom), Aristotle's
      distinction between techne and phronesis, and the author's own
      experience at the University of Chicago Law School and as an observant
      Jew denied Sabbath accommodation, the book argues that law has two
      purposes — foundation and scaffolding — and that modern regulatory
      culture has become obsessed with foundations while forgetting what
      they were built to support. The Boeing 737 MAX is the paradigm case.
