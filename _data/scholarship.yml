  - id: genius-dilemma
    title: "The GENIUS Dilemma: Innovation Versus Antifraud in Stablecoin Regulation"
    type: article
    year: 2025
    status: published
    journal: "Stanford Journal of Blockchain Law & Policy"
    citation: "Seth C. Oranburg, The GENIUS Dilemma: Innovation Versus Antifraud in Stablecoin Regulation, 9.1 Stan. J. Blockchain L. & Pol'y (2025)."
    coauthors: []
    abstract: >
      First doctrinal analysis of the GENIUS Act, enacted after the TerraUSD
      collapse exposed unregulated stablecoin risks in a $260 billion market.
      The statute exempts compliant payment stablecoins from the Securities
      Act, enforces strict reserve requirements, requires contractual
      redemption rights, and creates a priority claim in insolvency —
      shifting enforcement from ex post Rule 10b-5 litigation to ex ante
      prudential oversight while securing consumer assets via bankruptcy
      protections.
    cluster: digital-assets
    tags: [stablecoin, GENIUS Act, cryptocurrency, securities law]
    links:
      ssrn: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5366627"
      published:
      pdf: "/assets/pdfs/the-genius-dilemma.pdf"
      companion:
    featured: true

  - id: replacing-howey
    title: "Replacing Howey with CLARITY: Resolving Securities Regulation's Temporal Paradox"
    type: article
    year: 2025
    status: forthcoming
    journal: "Review of Banking and Financial Law — Boston University"
    citation: "Seth C. Oranburg, Replacing Howey with CLARITY: Resolving Securities Regulation's Temporal Paradox, Rev. Banking & Fin. L. (forthcoming 2026)."
    coauthors: []
    abstract: >
      Blockchain assets can transform their legal status as they decentralize,
      evolving from securities to commodity-like instruments. The Howey test
      provides no framework for this evolution — a gap termed the "Temporal
      Paradox." The CLARITY Act resolves it by structuring regulation around
      asset lifecycle phases with a conditional exemption and maturity
      certification mechanism.
    cluster: digital-assets
    tags: [Howey test, CLARITY Act, digital assets, blockchain, securities regulation]
    links:
      ssrn: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5288934"
      published:
      pdf: "/assets/pdfs/replacing-howey-with-clarity.pdf"
      companion:
    featured: true

