    coauthors: []
    abstract: >
      Supplies the missing variable in legal analysis: governance itself.
      Defines governance as the organized system by which a group manages
      a shared problem over time, with four indispensable elements
      (decision-making, monitoring, sanctions, adjustment). Demonstrates
      that many governance institutions have the structure of club goods,
      distinguishes member benefits from spillover effects, and offers a
      seven-step method for evaluating legal rules by what they do to
      governance. Applies the framework across merchant networks, stock
      exchanges, corporate boards, universities, nonprofits, and law reviews.
