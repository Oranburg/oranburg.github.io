clusters:
  - id: digital-assets
    label: Digital Assets, Securities Classification & Cryptocurrency Regulation
    color: blue-light
    description: >
      Stablecoin regulation, token classification under the Howey test,
      DeFi safe harbors, and the GENIUS and CLARITY Acts. Covers the legal
      framework for determining whether a digital asset is a security, commodity,
      or utility token.

  - id: startup-finance
    label: Securities Regulation, Crowdfunding & Startup Capital Formation
    color: teal
    description: >
      Private securities offerings, equity crowdfunding, the JOBS Act,
      venture stock exchanges, and the Series A gap. Includes empirical
      research on gender disparities in crowdfunding outcomes.

  - id: governance
    label: Corporate Governance, ESG Disclosure & Shareholder Rights
    color: yellow
    description: >
      Board governance, mandatory ESG disclosure, shareholder activism,
      social media and corporate power, and the institutional design of
      organizations that maintain — or lose — integrity.

  - id: labor
    label: Gig Economy, Worker Classification & Labor Market Regulation
    color: red-light
    description: >
      Worker classification disputes, transaction cost economics of
      employment, labor market monopsony, and proposed regulatory
      frameworks for gig economy benefits and platform accountability.

  - id: education
    label: Legal Education, Pedagogy & Casebooks
    color: blue-bright
    description: >
      Law school pedagogy, hybrid and online teaching, continuing legal
      education reform, systems-based IP curriculum design, and published
      casebooks and study guides.

  - id: ip
    label: Trade Secret Misappropriation, Valuation & IP Remedies
    color: red-deep
    description: >
      Trade secret law, the reasonable royalties remedy, epistemic limits
      of judicial valuation for uncertain-value secrets, and the distinction
      between market-anchored and uncertain-value trade secrets.

  - id: civil-society
    label: Free Speech, Antisemitism & Institutional Integrity
    color: accent-2
    description: >
      Campus free speech, the legal distinction between anti-Zionism and
      antisemitism, social media and democratic discourse, and institutional
      responses to ideological conflict.

