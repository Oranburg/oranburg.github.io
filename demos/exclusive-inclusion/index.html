<script type="text/babel">
const { useState, useMemo } = React;

// --- Equilibrium Solver (Verified) ---
function solveEquilibrium(s, sigma, tau, phi, constants) {
  const { alpha, beta, gamma, epsilon, delta, psi, kappa, omega } = constants;
  let c = 0.5, m = 0.1, h = 0.0, e = 0.0;
  for (let i = 0; i < 50; i++) {
    const c_new = Math.max(0, Math.min(1, (1 - s*m - sigma*s*h - tau*s*e) / (2 * phi)));
    const h_new = Math.max(0, Math.min(1, (sigma * s * c * psi) / (2 * delta)));
    const e_new = Math.max(0, Math.min(1, (tau * s * c * omega) / (2 * kappa)));
    const m_new = Math.max(0, Math.min(1, (sigma * s * h * beta + tau * e * gamma + epsilon) / (2 * alpha)));
    c = c_new; m = m_new; h = h_new; e = e_new;
  }
  return { c, m, h, e };
}

function getQualLabel(type, val) {
  if (type === 'capture') {
    if (val > 0.7) return { text: 'High \u2014 Accountability void', cls: 'c-red' };
    if (val > 0.4) return { text: 'Moderate \u2014 Partial constraint', cls: 'c-amber' };
    return { text: 'Low \u2014 Functional governance', cls: 'c-green' };
  }
  if (val < 0.1) return { text: 'Inactive', cls: 'c-slate' };
  if (val < 0.3) return { text: 'Weak', cls: 'c-amber' };
  return { text: 'Active', cls: 'c-green' };
}

// --- Main App ---
function App() {

  return (

        </div>

        <a className="exi-link" href="/scholarship/">Scholarship</a>
        <a className="exi-link" href="/demos/ostracism-game/">The Ostracism Game</a>
        <a className="exi-link" href="/demos/trade-secret-paradox/">The Trade Secret Paradox</a>
        <a className="exi-link" href="/courses/">Courses</a>
        <a className="exi-link" href="/insights/">Insights</a>
      </div>

}

// --- Formal Model ---
function FormalModel() {
  const [s, setS] = useState(0);
  const [sigma, setSigma] = useState(0);
  const [tau, setTau] = useState(0);
  const [phi, setPhi] = useState(0.6);
  const [lambda, setLambda] = useState(1.0);
  const [showAdv, setShowAdv] = useState(false);
  const [presetDesc, setPresetDesc] = useState('Vague missions, no stakeholder standing, no external governance test.');

  const C = { alpha:0.5, beta:0.8, gamma:0.8, epsilon:0.05, delta:0.5, psi:0.8, kappa:0.5, omega:0.8 };
  const rk = { k_s: 0.1, k_sigma: 0.15, k_tau: 0.12 };

  const eq = useMemo(() => solveEquilibrium(s, sigma, tau, phi, C), [s, sigma, tau, phi]);
  const voidEq = useMemo(() => solveEquilibrium(0, 0, 0, phi, C), [phi]);

  const payoffs = useMemo(() => {
    const {c,m,h,e} = eq;
    return {
      F: c*(1-s*m) - sigma*s*h*c - tau*s*e*c - phi*c*c,
      B: -C.alpha*m*m + (sigma*s*h*C.beta + tau*e*C.gamma + C.epsilon)*m,
      S: -C.delta*h*h + sigma*s*c*C.psi*h,
      E: -C.kappa*e*e + tau*s*c*C.omega*e,
    };
  }, [eq, s, sigma, tau, phi]);

  const socialBenefit = lambda * (voidEq.c*voidEq.c - eq.c*eq.c);
  const reformCost = rk.k_s*s*s + rk.k_sigma*sigma + rk.k_tau*tau;
  const netWelfare = socialBenefit - reformCost;
  const capReduction = voidEq.c - eq.c;
  const breakEven = (voidEq.c !== eq.c) ? reformCost / (voidEq.c*voidEq.c - eq.c*eq.c) : null;
  const isVoid = s === 0 || (sigma === 0 && tau === 0);

  const presets = [
    { label:'Current US Law (Void)', s:0, sigma:0, tau:0, phi:0.6, desc:'Vague missions, no stakeholder standing, no external governance test.' },
    { label:'Specificity Only', s:0.8, sigma:0, tau:0, phi:0.6, desc:'Specific mission, but no one can enforce it.' },
    { label:'Standing Only', s:0, sigma:1, tau:0, phi:0.6, desc:'Stakeholders can sue, but no standard to argue against.' },
    { label:'Full Reform', s:0.8, sigma:1, tau:1, phi:0.6, desc:'All three reforms active. Watch capture drop.' },
    { label:'Small Organized Faction', s:0.8, sigma:1, tau:1, phi:0.3, desc:'Full reform but facing a highly organized faction (low \u03c6).' },
  ];

  function applyPreset(p) {
    setS(p.s); setSigma(p.sigma); setTau(p.tau); setPhi(p.phi); setPresetDesc(p.desc);
  }

  function fmtPay(v) { return v.toFixed(3); }

  return (
    <div>
      {/* Presets */}
      <div className="exi-presets">
        {presets.map((p,i) => {
          const active = p.s===s && p.sigma===sigma && p.tau===tau && Math.abs(p.phi-phi)<0.01;
          return <button key={i} className={`exi-preset-btn ${active?'active':''}`} onClick={()=>applyPreset(p)}>{p.label}</button>;
        })}
      </div>
      <div className="exi-preset-desc">{presetDesc}</div>

      <div className="exi-grid exi-grid-2">
        {/* Left: Controls + Equilibrium */}
        <div className="exi-card">
          <div className="exi-h2">1. Governance Architecture</div>
          <p className="exi-subtitle">Modify structural levers to build the reform package.</p>

          <div className="exi-slider-wrap">
            <div className="exi-slider-header">
              <span className="exi-slider-label">Mission Specificity (s)</span>
              <span className="exi-slider-value">{s.toFixed(2)}</span>
            </div>
            <input type="range" min="0" max="1" step="0.01" value={s} onChange={e=>{setS(+e.target.value);setPresetDesc('Custom configuration.');}} className="exi-slider" />
            <div className="exi-slider-range"><span>0 = Vague</span><span>1 = Specific</span></div>
          </div>

          <div className="exi-grid-2-btn">
            <button className={`exi-toggle ${sigma?'on':''}`} onClick={()=>{setSigma(sigma?0:1);setPresetDesc('Custom configuration.');}}>
              <span className="exi-toggle-symbol">&sigma; = {sigma}</span>
              <span className="exi-toggle-name">Stakeholder Standing</span>
              <span className="exi-toggle-status">{sigma?'Enabled':'Disabled'}</span>
            </button>
            <button className={`exi-toggle ${tau?'on on-teal':''}`} onClick={()=>{setTau(tau?0:1);setPresetDesc('Custom configuration.');}}>
              <span className="exi-toggle-symbol">&tau; = {tau}</span>
              <span className="exi-toggle-name">External Accountability</span>
              <span className="exi-toggle-status">{tau?'Enabled':'Disabled'}</span>
            </button>
          </div>

          <div className="exi-sep"></div>

          <div className="exi-h2">2. Equilibrium Behavior</div>
          <p className="exi-subtitle">Player strategies derived via iterative best-response. <em>Change the structure, watch the behavior follow.</em></p>

          <Bar label="Faction Capture (c*)" val={eq.c} color="#ef4444" type="capture" />
          <Bar label="Board Monitoring (m*)" val={eq.m} color="#3b82f6" type="monitoring" />
          <Bar label="Stakeholder Challenge (h*)" val={eq.h} color="#6366f1" type="challenge" />
          <Bar label="Enforcer Enforcement (e*)" val={eq.e} color="#14b8a6" type="enforcement" />
        </div>

        {/* Right: Payoffs */}
        <div className="exi-card-dark">
          <div className="exi-h2 exi-h2-white">Payoff Architecture</div>
          <p className="exi-subtitle" style={{color:'#64748b'}}>Quadratic costs guarantee interior Nash equilibrium.</p>

          {isVoid && (
            <div className="exi-void-alert">
              <strong>The Governance Void is Active.</strong>
              No formal governance mechanism constrains factional capture. Equilibrium shows near-maximal capture (c* &asymp; {voidEq.c.toFixed(2)}) with only minimal informal monitoring.
            </div>
          )}

          <Payoff player="Faction (F)" score={payoffs.F} eq={eq} s={s} sigma={sigma} tau={tau} phi={phi} type="F" />
          <Payoff player="Board (B)" score={payoffs.B} eq={eq} s={s} sigma={sigma} tau={tau} phi={phi} type="B" C={C} />
          <Payoff player="Stakeholders (S)" score={payoffs.S} eq={eq} s={s} sigma={sigma} tau={tau} phi={phi} type="S" C={C} />
          <Payoff player="Enforcer (E)" score={payoffs.E} eq={eq} s={s} sigma={sigma} tau={tau} phi={phi} type="E" C={C} />
        </div>
      </div>

      {/* Welfare Panel */}
      <div className="exi-card">
        <div className="exi-h2">Is Reform Worth It?</div>
        <p className="exi-subtitle">Social benefit of reduced capture versus cost of implementing reforms.</p>

        <div className="exi-grid exi-grid-2">
          <div>
            <div className="exi-welfare-arrow">
              <div className="exi-welfare-endpoint">
                <div className="exi-welfare-endpoint-label">Void</div>
                <div className="exi-welfare-endpoint-value" style={{color:'#ef4444'}}>{voidEq.c.toFixed(2)}</div>
              </div>
              <div style={{flex:1, textAlign:'center'}}>
                <span className={`exi-welfare-delta ${capReduction > 0.05 ? 'bg-green-light' : 'bg-amber-light'}`}>
                  &Delta;c = {capReduction.toFixed(2)}
                </span>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>&rarr;</div>
              </div>
              <div className="exi-welfare-endpoint">
                <div className="exi-welfare-endpoint-label">Reformed</div>
                <div className="exi-welfare-endpoint-value" style={{color: capReduction > 0.05 ? '#059669' : '#ef4444'}}>{eq.c.toFixed(2)}</div>
              </div>
            </div>

            <div className="exi-welfare-table">
              <div className="exi-welfare-row">
                <span>Social benefit of reduced capture:</span>
                <span style={{color:'#059669', fontWeight:700}}>+{socialBenefit.toFixed(3)}</span>
              </div>
              <div className="exi-welfare-row">
                <span>Cost of reforms:</span>
                <span style={{color:'#ef4444', fontWeight:700}}>-{reformCost.toFixed(3)}</span>
              </div>
              <div className="exi-welfare-row total">
                <span>Net welfare change:</span>
                <span style={{color: netWelfare > 0 ? '#059669' : '#ef4444'}}>
                  {netWelfare > 0 ? '+' : ''}{netWelfare.toFixed(3)} {netWelfare > 0 ? '\u2713' : '\u2717'}
                </span>
              </div>
            </div>
          </div>

          <div>
            <div className="exi-welfare-lambda">
              <div className="exi-slider-header">
                <span className="exi-slider-label" style={{color:'#92400e'}}>&lambda; &mdash; How harmful is governance capture?</span>
                <span className="exi-slider-value">{lambda.toFixed(2)}</span>
              </div>
              <input type="range" min="0.1" max="3.0" step="0.1" value={lambda} onChange={e=>setLambda(+e.target.value)} className="exi-slider" />
              <p style={{fontSize:12,color:'#92400e',marginTop:8}}>Higher &lambda; = capture is more harmful to excluded groups.</p>
            </div>

            <div className="exi-welfare-breakeven">
              {breakEven !== null && capReduction > 0.01
                ? <span>Reforms are welfare-positive when the social cost of capture exceeds: <strong style={{fontFamily:'monospace',background:'#e2e8f0',padding:'2px 6px',borderRadius:4}}>{breakEven.toFixed(2)}</strong></span>
                : <span style={{color:'#94a3b8',fontStyle:'italic'}}>No meaningful reforms are currently active.</span>
              }
            </div>

            <button className="exi-advanced-toggle" onClick={()=>setShowAdv(!showAdv)}>
              <span>Advanced: Adjust Constants (&phi;, Costs)</span>
              <span>{showAdv ? '\u25B2' : '\u25BC'}</span>
            </button>
            {showAdv && (
              <div className="exi-advanced-body">
                <div className="exi-slider-header">
                  <span className="exi-slider-label">Faction Coordination Cost (&phi;)</span>
                  <span className="exi-slider-value">{phi.toFixed(2)}</span>
                </div>
                <input type="range" min="0.1" max="2.0" step="0.1" value={phi} onChange={e=>{setPhi(+e.target.value);setPresetDesc('Custom configuration.');}} className="exi-slider" />
                <p style={{fontSize:11,color:'#64748b',marginTop:4}}>Lower &phi; = more organized faction = easier capture.</p>
                <div style={{marginTop:12,fontSize:12,color:'#64748b'}}>
                  <div><strong>Reform costs (fixed):</strong></div>
                  <div style={{fontFamily:'monospace',marginTop:4}}>k_s (mission drafting): {rk.k_s}</div>
                  <div style={{fontFamily:'monospace'}}>k_&sigma; (litigation infra): {rk.k_sigma}</div>
                  <div style={{fontFamily:'monospace'}}>k_&tau; (IRS review): {rk.k_tau}</div>
                </div>
                <button style={{marginTop:12,fontSize:12,color:'#2563eb',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}} onClick={()=>{setPhi(0.6);setLambda(1.0);}}>
                  &#x21BA; Reset defaults
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// --- Bar Component ---
function Bar({label, val, color, type}) {
  const q = getQualLabel(type, val);
  return (
    <div className="exi-bar-wrap">
      <div className="exi-bar-header">
        <span className="exi-bar-label">{label}</span>
        <span className={`exi-bar-qual ${q.cls}`}>{q.text}</span>
      </div>
      <div className="exi-bar-row">
        <div className="exi-bar-track" style={{flex:1}}>
          <div className="exi-bar-fill" style={{width:`${(val*100).toFixed(0)}%`, background:color}}></div>
        </div>
        <span className="exi-bar-num">{val.toFixed(2)}</span>
      </div>
    </div>
  );
}

// --- Payoff Component ---
function Payoff({player, score, eq, s, sigma, tau, phi, type, C}) {
  const {c,m,h,e} = eq;
  const f = v => v.toFixed(2);
  let formula;
  if (type === 'F') {
    formula = `${f(c)}\u00B7(1\u2212${f(s)}\u00B7${f(m)}) \u2212 ${sigma}\u00B7${f(s)}\u00B7${f(h)}\u00B7${f(c)} \u2212 ${tau}\u00B7${f(s)}\u00B7${f(e)}\u00B7${f(c)} \u2212 ${f(phi)}\u00B7${f(c)}\u00B2`;
  } else if (type === 'B') {
    formula = `\u2212${f(C.alpha)}\u00B7${f(m)}\u00B2 + (${sigma}\u00B7${f(s)}\u00B7${f(h)}\u00B7${f(C.beta)} + ${tau}\u00B7${f(e)}\u00B7${f(C.gamma)} + ${f(C.epsilon)})\u00B7${f(m)}`;
  } else if (type === 'S') {
    formula = `\u2212${f(C.delta)}\u00B7${f(h)}\u00B2 + ${sigma}\u00B7${f(s)}\u00B7${f(c)}\u00B7${f(C.psi)}\u00B7${f(h)}`;
  } else {
    formula = `\u2212${f(C.kappa)}\u00B7${f(e)}\u00B2 + ${tau}\u00B7${f(s)}\u00B7${f(c)}\u00B7${f(C.omega)}\u00B7${f(e)}`;
  }
  const neg = score < 0;
  return (
    <div className="exi-payoff">
      <div className="exi-payoff-body">
        <div className="exi-payoff-player">{player}</div>
        <div className="exi-payoff-formula">&pi; = {formula}</div>
      </div>
      <div className={`exi-payoff-score ${neg ? 'exi-payoff-neg' : 'exi-payoff-pos'}`}>{score.toFixed(3)}</div>
    </div>
  );
}

// --- Disentanglement Matrix ---
function Matrix() {
  const [actor, setActor] = useState('Institutional');
  const [target, setTarget] = useState('Identity');

  const quads = {
    'Individual-Perspective': { title:'Protected Expression', desc:'An individual exercising personal judgment over a perspective.', example:'A professor declining collaboration over a disagreement about foreign policy.', bgCls:'bg-green-light' },
    'Individual-Identity': { title:'Personal Discrimination', desc:'An individual targeting an identity group.', example:'A professor refusing to supervise students of a specific religion (a Title VI violation).', bgCls:'bg-amber-light' },
    'Institutional-Perspective': { title:'Governance Question', desc:'An institution deploying authority over a perspective.', example:'A faculty senate passing a political resolution.', bgCls:'bg-amber-light' },
    'Institutional-Identity': { title:'Exclusive Inclusion', desc:'An institution deploying authority against an identity group.', example:'A department using official resources to exclude scholars by nationality. This is a structural void requiring governance reform.', bgCls:'bg-red-light' },
  };

  const key = `${actor}-${target}`;
  const info = quads[key];

  return (
    <div className="exi-card">
      <div className="exi-grid exi-grid-2" style={{alignItems:'start'}}>
        <div>
          <div className="exi-h2">Matrix Parameters</div>
          <div style={{marginBottom:16}}>
            <div className="exi-subtitle" style={{marginBottom:8}}>1. Who is acting?</div>
            <div className="exi-grid-2-btn">
              <button className={`exi-preset-btn ${actor==='Individual'?'active':''}`} onClick={()=>setActor('Individual')}>Individual</button>
              <button className={`exi-preset-btn ${actor==='Institutional'?'active':''}`} onClick={()=>setActor('Institutional')}>Institutional</button>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div className="exi-subtitle" style={{marginBottom:8}}>2. What is targeted?</div>
            <div className="exi-grid-2-btn">
              <button className={`exi-preset-btn ${target==='Perspective'?'active':''}`} onClick={()=>setTarget('Perspective')}>Perspective</button>
              <button className={`exi-preset-btn ${target==='Identity'?'active':''}`} onClick={()=>setTarget('Identity')}>Identity</button>
            </div>
          </div>
          <div className={`exi-matrix-info ${info.bgCls}`}>
            <h3>{info.title}</h3>
            <p>{info.desc}</p>
            <div className="exi-matrix-example"><strong>Example:</strong> {info.example}</div>
          </div>
        </div>

        <div>
          <div className="exi-matrix-col-headers">
            <div></div>
            <div>Perspective</div>
            <div>Identity</div>
          </div>
          <div className="exi-matrix-grid" style={{marginBottom:8}}>
            <div className="exi-matrix-label">Individual</div>
            <div className={`exi-matrix-cell ${actor==='Individual'&&target==='Perspective'?'active':''}`} style={actor==='Individual'&&target==='Perspective'?{background:'#ecfdf5',borderColor:'#34d399'}:{}}>
              <span className="exi-matrix-cell-name" style={{color:'#065f46'}}>Protected Expression</span>
            </div>
            <div className={`exi-matrix-cell ${actor==='Individual'&&target==='Identity'?'active':''}`} style={actor==='Individual'&&target==='Identity'?{background:'#fff7ed',borderColor:'#fb923c'}:{}}>
              <span className="exi-matrix-cell-name" style={{color:'#9a3412'}}>Personal Discrimination</span>
            </div>
          </div>
          <div className="exi-matrix-grid">
            <div className="exi-matrix-label">Institution</div>
            <div className={`exi-matrix-cell ${actor==='Institutional'&&target==='Perspective'?'active':''}`} style={actor==='Institutional'&&target==='Perspective'?{background:'#f5f3ff',borderColor:'#a78bfa'}:{}}>
              <span className="exi-matrix-cell-name" style={{color:'#5b21b6'}}>Governance Question</span>
            </div>
            <div className={`exi-matrix-cell ${actor==='Institutional'&&target==='Identity'?'active':''}`} style={actor==='Institutional'&&target==='Identity'?{background:'#fef2f2',borderColor:'#ef4444',boxShadow:'0 0 0 4px rgba(239,68,68,0.15)'}:{}}>
              <span className="exi-matrix-cell-name" style={{color:'#991b1b',fontSize:16}}>Exclusive Inclusion</span>
              <span style={{color:'#dc2626',fontSize:11,marginTop:4}}>The Accountability Void</span>
