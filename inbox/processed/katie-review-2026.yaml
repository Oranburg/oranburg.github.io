  by_priority:
    high: 1
    medium: 5
    low: 9
  by_type:
    navigation_ux: 2
    content_consistency: 1
    content_quality: 2
    content_enhancement: 1
    content_accuracy: 2
    content_bug: 1
    structural_duplication: 1
    functionality_concern: 1
    broken_link: 2
    missing_feature: 1
  pages_reviewed:
    - Home
    - Insights
    - "Courses (index, Contracts, Business Associations, Trade Secrets)"
